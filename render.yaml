services:
  - type: web
    name: my-pivot-app
    env: python
    buildCommand: "cd frontend && npm install && VITE_API_BASE=\"\" npm run build && cd ../backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: my_pivot_db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.0
